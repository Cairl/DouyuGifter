name: Daily Gift Send

on:
  # Every 6 hours (UTC)
  schedule:
    - cron: '0 */6 * * *'
  # Manual trigger
  workflow_dispatch:

jobs:
  send_gift:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run
        id: run
        env:
          COOKIE: ${{ secrets.COOKIE }}
          ROOM_ID: ${{ secrets.ROOM_ID || '74751' }}
          OUTPUT_COOKIE: '1'
        run: |
          set -euo pipefail
          set +e
          COOKIE_OUTPUT=$(python main.py | awk -F= '/^cookie=/{print $0}')
          STATUS=$?
          set -e
          if [ -n "$COOKIE_OUTPUT" ]; then
            echo "$COOKIE_OUTPUT" >> "$GITHUB_OUTPUT"
          fi
          exit $STATUS

      - name: Update COOKIE secret
        if: ${{ always() && steps.run.outputs.cookie != '' }}
        env:
          GH_TOKEN: ${{ secrets.COOKIE_PAT }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "COOKIE_PAT missing; skip."
            exit 0
          fi
          gh secret set COOKIE -b "${{ steps.run.outputs.cookie }}"
